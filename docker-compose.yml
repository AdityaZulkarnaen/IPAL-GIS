services:
  bpalpjk-app:
    build:
      context: ./
      dockerfile: ./Dockerfile
    container_name: bpalpjk-web
    environment:
      - ALLOW_OVERRIDE=true
      - TZ=Asia/Jakarta
    restart: unless-stopped
    volumes:
      - ./bpalpjk-app:/var/www/
      - ./log:/var/log
      - ./custom.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - networking
  bpalpjk-nginx:
    image: nginx:alpine
    container_name: bpalpjk-nginx
    environment:
      - ALLOW_OVERRIDE=true
      - TZ=Asia/Jakarta
    restart: unless-stopped
    ports:
      - "$PORT:443"
    volumes:
        - ./bpalpjk-app:/var/www/
        - ./default.conf:/etc/nginx/conf.d/default.conf
        - ./log:/var/log
    networks:
        - networking
networks:
  networking:
    external: true
